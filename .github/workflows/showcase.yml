name: Showcase

on:
  push:
  pull_request:

jobs:
  showcase:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: squn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

      mysql:
        # mysql:5.7 uses mysql_native_password by default and has a simpler handshake
        # than 8.0 — isolating whether Bun.SQL's MySQL parser breaks on 8.0-specific
        # handshake fields (caching_sha2_password capability, new capability flags).
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: squn_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -ppassword"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -Q 'SELECT 1' -No"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # squn is resolved via tsconfig paths: "squn" → "../squn/src/index.ts".
      # Clone it as a sibling so that relative path resolves at runtime.
      - name: Clone squn
        run: git clone --depth=1 https://github.com/phonemyatt/squn.git "$GITHUB_WORKSPACE/../squn"

      # Bun.SQL correctly attempts TLS when MySQL advertises it, but rejects MySQL's
      # default self-signed certificate (rejectUnauthorized: true by default).  The
      # MysqlAdapter in squn doesn't expose a tls option, so we patch the cloned
      # source to accept self-signed certs in CI.  This keeps TLS active (correct
      # behaviour) while allowing the ephemeral CI certificate to be trusted.
      - name: Patch squn MySQL adapter (accept self-signed cert in CI)
        run: |
          sed -i 's/new SQL({/new SQL({ tls: { rejectUnauthorized: false },/g' \
            "$GITHUB_WORKSPACE/../squn/src/adapters/mysql.ts"

      - name: Install dependencies
        run: bun install

      - name: Run showcase
        env:
          SKIP_DOCKER: "1"
          PG_URL: postgresql://postgres:password@localhost:5432/squn_test
          MYSQL_URL: mysql://root:password@127.0.0.1:3306/squn_test
          MSSQL_HOST: localhost
          MSSQL_PORT: "1433"
          MSSQL_DB: master
          MSSQL_USER: sa
          MSSQL_PASSWORD: Password123!
        run: bun run showcase:all
